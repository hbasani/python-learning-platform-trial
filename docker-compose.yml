services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: learning
      POSTGRES_USER: learning
      POSTGRES_PASSWORD: learning
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on: [postgres, redis, executor]
    ports: ["8000:8000"]

  executor:
    build: ./executor_worker
    env_file: ./backend/.env
    depends_on: [redis]
    ports: ["8010:8010"]

  frontend:
    build: ./frontend
    env_file: ./frontend/.env.local
    depends_on: [backend]
    ports: ["3000:3000"]

volumes:
  pg_data:
